name: Mustafa+Ahmed

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    permissions:
      contents: write

    steps:
       - name: checkout
         uses: actions/checkout@v3

       # --- [نظام ترحيل المشاريع التلقائي] ---
       - name: Auto-Lifecycle Manager
         run: |
           git config --global user.name "Telegarm-R2RR7"
           git config --global user.email "R2RR7.mr7@gmail.com"
           git clone https://Telegarm-R2RR7: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@github.com/${{ github.repository_owner }}/myloop.git
           cd myloop
           
           LAST_ENTRY=$(tail -n 1 loop.txt)
           PROJECT_NAME=$(echo $LAST_ENTRY | cut -d':' -f1)
           START_DATE=$(echo $LAST_ENTRY | cut -d':' -f2)
           
           CURRENT_DATE=$(date +%s)
           TARGET_DATE=$(date -d "$START_DATE" +%s)
           DIFF_DAYS=$(( (CURRENT_DATE - TARGET_DATE) / 86400 ))
           
           if [ "$DIFF_DAYS" -ge 5 ]; then
             NEW_PROJECT="MD$(( ${PROJECT_NAME#MD} + 1 ))"
             echo "🚀 تم تجاوز 5 أيام. إنشاء المشروع: $NEW_PROJECT"
             
             gh repo create "$NEW_PROJECT" --private --clone
             cp -r ../. ./"$NEW_PROJECT"/
             
             echo "$NEW_PROJECT:$(date +%Y-%m-%d)" >> loop.txt
             git add loop.txt
             git commit -m "Auto-migration to $NEW_PROJECT"
             git push
             
             echo "🛑 إنهاء الدورة الحالية للأبد..."
             exit 1
           else
             echo "✅ الدورة صالحة (مضى $DIFF_DAYS يوم)."
           fi

       # --- [التهيئة والاستنساخ] ---
       - name: cloning repository
         run: |
           git config --global credential.helper store
           echo "https://Telegarm-R2RR7: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@github.com" > ~/.git-credentials
           git clone https://github.com/r2rr7m77r-rgb/Mybot alexa

       - name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v2

       - name: Cache Docker layers
         uses: actions/cache@v3
         with:
           path: /tmp/.buildx-cache
           key: ${{ runner.os }}-buildx-${{ hashFiles('**/requirements.txt', '**/setup.sh') }}
           restore-keys: |
             ${{ runner.os }}-buildx-

       - name: Building Docker
         run: |
           cd alexa
           docker buildx build \
             --cache-from=type=local,src=/tmp/.buildx-cache \
             --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
             -t mustafa --load .

       # --- [المراقبة والتبديل الذكي] ---
       - name: Instant Handover
         run: |
           cd alexa
           export GH_TOKEN=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
           REPO_PATH="${{ github.repository_owner }}/Mybot"
           OLD_RUN_ID=$(gh run list --repo "$REPO_PATH" --workflow "Mustafa+Ahmed" --status in_progress --json databaseId --jq ".[].databaseId" | grep -v "${{ github.run_id }}" | head -n 1)
           
           if [ ! -z "$OLD_RUN_ID" ]; then
             gh run cancel "$OLD_RUN_ID" --repo "$REPO_PATH"
             while [ "$(gh run view "$OLD_RUN_ID" --repo "$REPO_PATH" --json status --jq ".status")" != "completed" ]; do sleep 1; done
             docker run -d -p 80:80 --name bot_container mustafa
           else
             docker run -d -p 80:80 --name bot_container mustafa
           fi

           sleep 3
           if docker ps | grep -q "bot_container"; then
             echo "✅ البوت الجديد انطلق بنجاح."
           fi

       # --- [مرحلة عمل السيرفر والنداء الذاتي] ---
       - name: Run Server & Trigger Next Loop
         run: |
           export GH_TOKEN=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
           sleep 4620
           gh workflow run "Mustafa+Ahmed" --repo "${{ github.repository_owner }}/Mybot" --ref main
           sleep 360

       - name: Move cache
         run: |
           rm -rf /tmp/.buildx-cache
           mv /tmp/.buildx-cache-new /tmp/.buildx-cache

